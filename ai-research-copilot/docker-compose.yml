version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: copilot_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build: 
      context: ./backend
    container_name: copilot_backend
    ports:
      - '5000:5000'
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ai-research-copilot
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
    container_name: copilot_frontend
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
